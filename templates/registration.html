<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDiary - Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <a href="/" class="logo-link">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="logo" width="40" height="40">
            <span class="logo-text">DevDiary</span>
        </a>
    </header>
    <main class="main-login">
        <form action="{{ url_for('reg') }}" method="post" class="form__card">
            <h2>Crea tu cuenta</h2>
            
            <div class="form__inputs">
                <label for="email" class="full-width">
                    <input class="form__input full-width" type="email" name="email" id="email" placeholder="Ingresa tu e-mail" required>
                </label>
                <label for="password" class="full-width">
                    <input class="form__input full-width" type="password" name="password" id="password" placeholder="Ingresa tu contraseña" required>
                </label>
            </div>
            
            <button type="submit" class="form__button full-width">Crear cuenta</button>
            <p style="text-align: center; margin-top: 10px; color: var(--text-muted);">
                ¿Ya tienes cuenta? <a href="/login" style="color: var(--accent); font-weight: 600;">Inicia sesión</a>
            </p>
        </form>
    </main>
</body>
</html>
