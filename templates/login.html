<!-- login.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDiary - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#08142b;
            color:white;
        }

        .navbar{
            width:100%;
            height:70px;
            border-bottom:1px solid rgba(255,255,255,0.1);
            display:flex;
            align-items:center;
            padding:0 30px;
        }

        .logo{
            color:#18b3ff;
            font-size:30px;
            margin-right:10px;
        }

        .brand{
            color:#18b3ff;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin-top:60px;
        }

        .card{
            width:430px;
            background:#13233f;
            padding:40px;
            border-radius:20px;
            border:1px solid rgba(255,255,255,0.05);
        }

        h1{
            text-align:center;
            margin-bottom:40px;
            font-size:38px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:25px;
        }

        input{
            width:100%;
            padding:18px;
            border:none;
            border-radius:12px;
            background:#0b1831;
            color:white;
            font-size:16px;
            outline:none;
            border:1px solid rgba(255,255,255,0.1);
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:12px;
            background:#18b3ff;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .register{
            text-align:center;
            margin-top:30px;
            color:#9ca3af;
        }

        .register a{
            color:#18b3ff;
            text-decoration:none;
            font-weight:bold;
        }

        .error{
            text-align:center;
            color:#ff5c5c;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="navbar">
        <div class="logo">📘</div>
        <div class="brand">DevDiary</div>
    </div>

    <div class="container">

        <div class="card">

            <h1>Bienvenido a DevDiary</h1>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Iniciar Sesión
                </button>

            </form>

            <div class="error">
                {{ error }}
            </div>

            <div class="register">
                ¿No tienes cuenta?
                <a href="/reg">Regístrate aquí</a>
            </div>

        </div>

    </div>

</body>

</html>
